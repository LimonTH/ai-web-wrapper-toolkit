<main class="main">
    {% block content %}{% endblock %}
</main>

<div id="modal"></div>
<div id="toast"></div>

<script>
    // ============================================================
    // Theme toggle — dark / light mode
    // ============================================================
    window.__theme = {
        key: 'awt-theme',
        html: document.documentElement,

        set: function (theme) {
            this.html.setAttribute('data-theme', theme);
            localStorage.setItem(this.key, theme);
        },

        toggle: function () {
            var current = this.html.getAttribute('data-theme') || 'light';
            this.set(current === 'dark' ? 'light' : 'dark');
        }
    };

    (function () {
        var saved = localStorage.getItem(window.__theme.key);
        if (saved === 'dark' || saved === 'light') {
            window.__theme.set(saved);
        } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            window.__theme.set(prefersDark ? 'dark' : 'light');
        }

        // Wire up theme button in sidebar
        var btn = document.getElementById('theme-btn');
        if (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                window.__theme.toggle();
            });
        }
    })();

    // Toast notification system
    function showToast(message, type) {
        type = type || 'success';
        var toast = document.getElementById('toast');
        toast.innerHTML = '<div class="toast toast-' + type + ' fade-in">' + message + '</div>';
        setTimeout(function () {
            toast.innerHTML = '';
        }, 4000);
    }

    // HTMX: auto-show toast from HX-Trigger header
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.detail.target.id === 'toast') {
            setTimeout(function () {
                document.getElementById('toast').innerHTML = '';
            }, 4000);
        }
    });
    document.body.addEventListener('htmx:responseError', function (evt) {
        var xhr = evt.detail.xhr;
        if (xhr) {
            try {
                var err = JSON.parse(xhr.responseText);
                var msg = err.detail || '';
                if (Array.isArray(msg)) {
                    msg = msg.map(function (m) {
                        return m.msg || JSON.stringify(m);
                    }).join('; ');
                }
                showToast(msg || 'Request failed (' + xhr.status + ')', 'error');
            } catch (e) {
                showToast('Request failed (' + xhr.status + ')', 'error');
            }
        }
    });
    document.body.addEventListener('htmx:beforeSwap', function (evt) {
        var headers = evt.detail.xhr.getAllResponseHeaders();
        if (headers.indexOf('HX-Trigger') >= 0) {
            try {
                var trigger = JSON.parse(evt.detail.xhr.getResponseHeader('HX-Trigger'));
                if (trigger.showToast) {
                    evt.detail.shouldSwap = true;
                    setTimeout(function () {
                        showToast(trigger.showToast.message, trigger.showToast.type || 'success');
                    }, 50);
                }
            } catch (e) {
            }
        }
    });

    // Modal: close only on full left-click outside the modal
    var _mousedownOverlay = null;
    document.addEventListener('mousedown', function (e) {
        _mousedownOverlay = (e.button === 0 && e.target.classList.contains('modal-overlay'))
            ? e.target : null;
    });
    document.addEventListener('mouseup', function (e) {
        if (e.button === 0 && _mousedownOverlay && e.target.classList.contains('modal-overlay')) {
            _mousedownOverlay.remove();
        }
        _mousedownOverlay = null;
    });
</script>
</body>
</html>
