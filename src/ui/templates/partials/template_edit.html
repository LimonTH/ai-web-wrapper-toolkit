<div class="modal-overlay fade-in">
    <div class="modal">
        <h2>Edit Template</h2>
        <form id="template-edit-form">
            <input type="hidden" name="id" value="{{ t.id }}">
            <div class="form-group"><label>Name</label><input name="name" value="{{ t.name }}" required></div>
            <div class="form-group"><label>Base URL</label><input name="base_url" value="{{ t.base_url }}" required>
            </div>
            <div class="form-group">
                <label>Auth Type</label>
                <select name="auth_type">
                    <option value="cookie" {% if t.auth_type=='cookie' %}selected{% endif %}>Cookie</option>
                    <option value="token" {% if t.auth_type=='token' %}selected{% endif %}>Bearer Token</option>
                    <option value="none" {% if t.auth_type=='none' %}selected{% endif %}>None</option>
                </select>
            </div>
            <div class="form-group"><label>Description</label><textarea name="description" rows="2">{{ t.description or '' }}</textarea>
            </div>
            {% if t.capabilities %}
            <div class="form-group">
                <label>Capabilities</label>
                <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
                    {% for cap in t.capabilities %}
                    <span class="tag tag-accent">{{ cap }}</span>
                    {% endfor %}
                </div>
                <span style="font-size:11px;color:var(--text-muted);margin-top:4px;display:block;">Set in provider adapter code (supports field).</span>
            </div>
            {% endif %}
            <div class="modal-actions">
                <button type="button" class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
<script>
    document.getElementById('template-edit-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const form = e.target;
        const data = Object.fromEntries(new FormData(form));
        const id = data.id;
        delete data.id;
        const resp = await fetch('/api/templates/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (resp.ok) {
            document.querySelector('.modal-overlay').remove();
            location.reload();
        } else {
            const err = await resp.json();
            document.getElementById('toast').innerHTML = '<div class="toast toast-error fade-in">' + JSON.stringify(err.detail) + '</div>';
        }
    });
</script>
