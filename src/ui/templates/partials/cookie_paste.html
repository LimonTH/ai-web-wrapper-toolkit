<div class="modal-overlay fade-in">
    <div class="modal">
        <h2>Paste Cookies</h2>
        <p class="text-sm text-secondary" style="margin-bottom:14px;">
            Export cookies from your real browser using <strong>EditThisCookie</strong> or <strong>Cookie-Editor</strong> extension, then paste the JSON array here.
        </p>
        <form id="paste-form">
            <div class="form-group">
                <label>Profile Name</label>
                <input name="name" placeholder="e.g., My ChatGPT Session" required>
            </div>
            <div class="form-group">
                <label>Provider</label>
                <select name="provider_id" required>
                    <option value="" disabled selected>— Select Provider —</option>
                    {% for p in providers %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Cookies JSON</label>
                <textarea name="cookies_json" rows="8" placeholder='[{"name":"session","value":"xxx","domain":".example.com","path":"/","httpOnly":true},...]' required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Cookies</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('paste-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    let cookies;
    try { cookies = JSON.parse(data.cookies_json); }
    catch { document.getElementById('toast').innerHTML = '<div class="toast toast-error fade-in">Invalid JSON!</div>'; return; }
    const resp = await fetch('/api/cookies', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: data.name, template_id: data.provider_id, cookies: cookies})
    });
    if (resp.ok) { document.querySelector('.modal-overlay').remove(); location.reload(); }
    else { const err = await resp.json(); document.getElementById('toast').innerHTML = '<div class="toast toast-error fade-in">'+JSON.stringify(err.detail)+'</div>'; }
});
</script>
