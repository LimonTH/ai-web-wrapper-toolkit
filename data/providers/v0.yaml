provider_id: v0
name: V0 by Vercel
base_url: https://v0.app

endpoints:
  chat:
    path: /chat/api/chat
    method: POST
    headers:
      content-type: application/json
      referer: https://v0.app/
      origin: https://v0.app
    body:
      messageContent:
        version: 1
        parts:
          - type: mdx
            content: ${session.last_user_message}
        type: parts
      messageId: ${session.message_id}
      chatId: ${session.chat_id}
      isNew: false
      parentId: ${session.parent_id}
      team: ${session.team}
      modelConfiguration:
        modelId: ${body.model}
        imageGenerations: true
        thinking: false
      optimisticConnectedIntegrations: []
      optimisticEnvVarKeys: []
      suggestedActionsEnabled: true
      mcpServers: []
      permissionsMode: auto
      chatCreationTime: ${session.chat_creation_time}
      previewViewport:
        mode: desktop
        width: 960
        height: 583
        colorScheme: light
    extract:
      content:
        - "$.text"
        - "$.choices[0].message.content"
      stream: "$.text"
